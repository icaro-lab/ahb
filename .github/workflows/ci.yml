name: CI

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m py_compile ahb_eval/*.py scripts/*.py
      - name: Prompt template JSON check
        run: python -m json.tool prompt_templates/method_prompts.json >/dev/null
